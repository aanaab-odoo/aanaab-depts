.kg{display:grid;gap:10px;margin-bottom:10px}

.dg{display:grid;gap:10px;margin-bottom:10px}

.divr{border-top:1px dashed #e2deff;margin:5px 0}
.pos{color:#059669}.neg{color:#dc2626}.ze{color:#d1d5db}
.tw{overflow-x:auto;border-radius:12px;border:1.5px solid #e2deff;background:#fff;margin-bottom:14px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#ede9fe;color:#7c3aed;font-weight:700;padding:8px;text-align:right;font-size:11px;white-space:nowrap;border-bottom:1px solid #d4ccff}

td{padding:7px 8px;border-bottom:1px solid #f0edff;text-align:right;white-space:nowrap}

tr:hover td{background:#faf9ff}

":244194,"Mar":153847,"Apr":169667,"May":162910,"Jun":0,"Jul":0,"Aug":0,"Sep":0,"Oct":0,"Nov":0,"Dec":0}},"Operations":{"Expenses":{"Jan":85204,"Feb":26294,"Mar":26646,"Apr":79225,"May":70102,"Jun":0,"Jul":0,"Aug":0,"Sep":0,"Oct":0,"Nov":0,"Dec":0},"Cash In":{"Jan":0,"Feb":0,"Mar":0,"Apr":0,"May":0,"Jun":0,"Jul":0,"Aug":0,"Sep":0,"Oct":0,"Nov":0,"Dec":0},"Cash Out":{"Jan":85204,"Feb":26294,"Mar":26509,"Apr":79087,"May":70102,"Jun":0,"Jul":0,"Aug":0,"Sep":0,"Oct":0,"Nov":0,"Dec":0}},"HR":{"Expenses":{"Jan":82578,"Feb":110835,"Mar":66386,"Apr":67273,"May":58862,"Jun":0,"Jul":0,"Aug":0,"Sep":0,"Oct":0,"Nov":0,"Dec":0},"Cash In":{"Jan":0,"Feb":0,"Mar":0,"Apr":0,"May":0,"Jun":0,"Jul":0,"Aug":0,"Sep":0,"Oct":0,"Nov":0,"Dec":0},"Cash Out":{"Jan":79778,"Feb":108581,"Mar":64951,"Apr":67312,"May":58862,"Jun":0,"Jul":0,"Aug":0,"Sep":0,"Oct":0,"Nov":0,"Dec":0}},"Finance":{"Expenses":{"Jan":31890,"Feb":40587,"Mar":33056,"Apr":39911,"May":54056,"Jun":0,"Jul":0,"Aug":0,"Sep":0,"Oct":0,"Nov":0,"Dec":0},"Cash In":{"Jan":0,"Feb":0,"Mar":0,"Apr":0,"May":0,"Jun":0,"Jul":0,"Aug":0,"Sep":0,"Oct":0,"Nov":0,"Dec":0},"Cash Out":{"Jan":30023,"Feb":38880,"Mar":31960,"Apr":38381,"May":51954,"Jun":0,"Jul":0,"Aug":0,"Sep":0,"Oct":0,"Nov":0,"Dec":0}},"Others":{"Expenses":{"Jan":370054,"Feb":418509,"Mar":393937,"Apr":365622,"May":570491,"Jun":90931,"Jul":0,"Aug":0,"Sep":0,"Oct":0,"Nov":0,"Dec":0},"Cash In":{"Jan":0,"Feb":0,"Mar":0,"Apr":0,"May":0,"Jun":0,"Jul":0,"Aug":0,"Sep":0,"Oct":0,"Nov":0,"Dec":0},"Cash Out":{"Jan":224000,"Feb":225292,"Mar":186700,"Apr":254000,"May":271378,"Jun":0,"Jul":0,"Aug":0,"Sep":0,"Oct":0,"Nov":0,"Dec":0}}};

var MN=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
var CFG={
  "B2C":{color:"#3b82f6",rev:true,group:"product"},

function cf(k){return CFG[k]||{color:"#6b7280",rev:false};}
function agg(k,f){return MN.reduce(function(s,m){return s+((D[k]&&D[k][f]&&D[k][f][m])||0);},0);}
function am(k,f,m){return (D[k]&&D[k][f]&&D[k][f][m])||0;}
function fK(n){if(!n&&n!==0)return"--";var s=n<0?"-":"",a=Math.abs(n);if(a>=1000000)return s+(a/1000000).toFixed(2)+"M";if(a>=1000)return s+(a/1000).toFixed(1)+"K";return s+Math.round(a).toLocaleString();}
function fm(n){return n?new Intl.NumberFormat("en").format(Math.round(n)):"--";}
function pc(p){return p>=100?"#059669":p>=50?"#d97706":"#dc2626";}
function pb(p,c){return "<div class='pb'><div class='pf' style='width:"+Math.min(p,100)+"%;background:"+c+";height:100%'></div></div>";}
function ss(state,msg){
  document.getElementById("sdot").className="sd"+(state=="spin"?" spin":"");
  document.getElementById("slbl").textContent=msg;
}

function parseCSV(text){
  var rows=text.split("\n").map(function(r){
    var cells=[],cur="",inq=false;
    for(var i=0;i<r.length;i++){
      var ch=r[i];
      if(ch=='"'){inq=!inq;}
      else if(ch==","&&!inq){cells.push(cur.trim());cur="";}
      else{cur+=ch;}
    }
    cells.push(cur.trim());return cells;
  });
  var hdr=-1;
  for(var i=0;i<rows.length;i++){if(rows[i][0]==="Department"){hdr=i;break;}}
  if(hdr<0)return null;
  var out={},cur=null;
  for(var i=hdr+1;i<rows.length;i++){
    var r=rows[i];
    if(!r[0]&&!r[1])continue;
    if(r[0].indexOf("COMPANY SUMMARY")>=0)break;
    var dv=r[0].trim(),fv=r[1].trim();
    if(dv){var nm=dv.replace(/^[^a-zA-Z]+/,"").trim();cur=nm;if(!out[cur])out[cur]={};}
    if(!cur||!fv)continue;
    out[cur][fv]={};
    for(var mi=0;mi<MN.length;mi++){
      var raw=(r[mi+2]||"").replace(/,/g,"").trim();
      if(raw.charAt(0)=="(")raw="-"+raw.slice(1,raw.length-1);
      out[cur][fv][MN[mi]]=raw===""?0:(parseFloat(raw)||0);
    }
  }
  return out;
}

function doSync(){
  ss("spin","Syncing...");
  fetch(CSV_URL)
    .then(function(r){return r.text();})
    .then(function(t){
      var p=parseCSV(t);
      if(p&&Object.keys(p).length){D=p;ss("","Updated "+new Date().toLocaleTimeString());renderAll();}
      else{ss("","Embedded data");}
    })
    .catch(function(){ss("","Embedded data");});
}

function nav(id){
  var ids=["ov","pr","pj","sp"];
  for(var i=0;i<ids.length;i++){
    document.getElementById("p-"+ids[i]).className="pg"+(ids[i]===id?" on":"");
    document.getElementById("t-"+ids[i]).className="tab"+(ids[i]===id?" on":"");
  }
}

function kpis(depts,mainRev,cashDs){
  var tR=mainRev.reduce(function(s,k){return s+agg(k,"Revenue");},0);
  var tT=mainRev.reduce(function(s,k){return s+agg(k,"Annual Target");},0);
  var tE=depts.reduce(function(s,k){return s+(k==="Tech & Product"?agg(k,"Cash Out"):agg(k,"Expenses"));},0);
  var tPL=tR-tE,tCI=cashDs.reduce(function(s,k){return s+agg(k,"Cash In");},0);
  var tCO=cashDs.reduce(function(s,k){return s+agg(k,"Cash Out");},0);
  var net=tCI-tCO,pct=tT>0?(tR/tT*100):0,pC=pc(pct);
  var h="<div class='kg k4'>";
  h+="<div class='kpi' style='--ac:#5b21b6'><div class='kl'>Total Revenue</div><div class='kv' style='color:#5b21b6'>"+fK(tR)+"</div><div class='ks'>SAR</div></div>";
  h+="<div class='kpi' style='--ac:"+pC+"'><div class='kl'>% of Target</div><div class='kv' style='color:"+pC+"'>"+pct.toFixed(1)+"%</div>"+pb(pct,pC)+"</div>";
  h+="<div class='kpi' style='--ac:#dc2626'><div class='kl'>Total Expenses</div><div class='kv' style='color:#dc2626'>"+fK(tE)+"</div></div>";
  h+="<div class='kpi' style='--ac:"+(tPL>=0?"#059669":"#dc2626")+"'><div class='kl'>Net P&L</div><div class='kv' style='color:"+(tPL>=0?"#059669":"#dc2626")+"'>"+fK(tPL)+"</div><div class='ks'>"+(tPL>=0?"Profit":"Loss")+"</div></div>";
  h+="</div><div class='kg k3' style='margin-top:0'>";
  h+="<div class='kpi' style='--ac:#059669'><div class='kl'>Cash In</div><div class='kv' style='color:#059669'>"+fK(tCI)+"</div></div>";
  h+="<div class='kpi' style='--ac:#dc2626'><div class='kl'>Cash Out</div><div class='kv' style='color:#dc2626'>"+fK(tCO)+"</div></div>";
  h+="<div class='kpi' style='--ac:"+(net>=0?"#059669":"#dc2626")+"'><div class='kl'>Net Cash Flow</div><div class='kv' style='color:"+(net>=0?"#059669":"#dc2626")+"'>"+fK(net)+"</div></div>";
  h+="</div>";return h;
}

function card(k,cashOnly){
  var c=cf(k);
  var rev=agg(k,"Revenue"),tgt=agg(k,"Annual Target");
  var exp=k==="Tech & Product"?agg(k,"Cash Out"):agg(k,"Expenses");
  var cIn=agg(k,"Cash In"),cOut=agg(k,"Cash Out"),netC=cIn-cOut;
  var pl=c.rev?(rev-exp):(0-exp);
  var p=tgt>0?(rev/tgt*100):0,pC=pc(p);
  var bc=pl>0?"bp":pl<0?"bl":"bn",bt=pl>0?"Profit":pl<0?"Loss":"--";
  var sub=c.sub?" <span style='font-size:10px;background:#fef3c7;color:#92400e;padding:1px 5px;border-radius:3px'>sub</span>":"";
  var h="<div class='dc' style='--dc:"+c.color+"'>";
  h+="<div class='dct'><span class='dcn'>"+k+sub+"</span><span class='badge "+bc+"'>"+bt+"</span></div>";
  if(!cashOnly){
    if(c.rev){
      h+="<div style='font-size:11px;color:#9ca3af'>Revenue</div>";
      h+="<div style='font-size:17px;font-weight:800;color:"+c.color+"'>"+fK(rev)+" <span style='font-size:11px;color:#9ca3af;font-weight:400'>SAR</span></div>";
      h+=pb(p,pC);
      h+="<div style='font-size:10px;font-weight:700;color:"+pC+";margin-top:2px'>"+p.toFixed(1)+"% of "+fK(tgt)+"</div>";
    }
    h+="<div class='cd' style='margin-top:6px'><span class='cdl'>Expenses"+(k==="Tech & Product"?" (cash out)":"")+"</span><span class='cdv neg'>"+fK(exp)+"</span></div>";
    h+="<div class='cd'><span class='cdl'>Net P&L</span><span class='cdv' style='color:"+(pl>=0?"#059669":"#dc2626")+"'>"+fK(pl)+"</span></div>";
    h+="<div class='divr'></div>";
  }
  h+="<div class='cd' style='margin-top:"+(cashOnly?"4px":"0")+"'><span class='cdl'>Cash in</span><span class='cdv pos'>"+fK(cIn)+"</span></div>";
  h+="<div class='cd'><span class='cdl'>Cash out</span><span class='cdv neg'>"+fK(cOut)+"</span></div>";
  h+="<div class='cd'><span class='cdl'>Net cash</span><span class='cdv' style='color:"+(netC>=0?"#059669":"#dc2626")+"'>"+fK(netC)+"</span></div>";
  h+="</div>";return h;
}

function deptTable(k){
  var c=cf(k);
  var rows=[
    {l:"Revenue",fn:function(m){return am(k,"Revenue",m);}},
    {l:"Annual Target",fn:function(m){return am(k,"Annual Target",m);}},
    {l:"Expenses",fn:function(m){return am(k,"Expenses",m);}},

    {l:"Cash Out",fn:function(m){return am(k,"Cash Out",m);}},

  h+="<div style='font-size:13px;font-weight:700;color:"+c.color+";margin-bottom:8px;padding:7px 12px;background:#fff;border-radius:9px;border-left:4px solid "+c.color+"'>"+k+(c.sub?" <span style='font-size:10px;background:#fef3c7;color:#92400e;padding:1px 6px;border-radius:3px'>sub</span>":"")+"</div>";
  h+="<div class='tw'><table><thead><tr><th>Field</th>";
  MN.forEach(function(m){h+="<th>"+m+"</th>";});
  h+="<th>Total</th></tr></thead><tbody>";
  rows.forEach(function(row){
    var tot=MN.reduce(function(s,m){return s+row.fn(m);},0);
    var bc=colors[row.l]||"#1e1b4b";
    h+="<tr><td style='color:"+bc+"'>"+row.l+"</td>";
    MN.forEach(function(m){
      var v=row.fn(m);
      var col=v>0?(colors[row.l]||"#059669"):v<0?"#dc2626":"#d1d5db";
      h+="<td style='color:"+col+"'>"+(v!==0?fm(v):"--")+"</td>";
    });
    var tc=tot>0?(colors[row.l]||"#059669"):tot<0?"#dc2626":"#d1d5db";
    h+="<td style='font-weight:700;color:"+tc+"'>"+(tot!==0?fm(tot):"--")+"</td></tr>";
  });
  h+="</tbody></table></div></div>";return h;
}

function cashTable(depts,field,totDs){
  var pc_=field==="Cash In"?"#059669":"#dc2626";
  var h="<div class='tw'><table><thead><tr><th>Department</th>";
  MN.forEach(function(m){h+="<th>"+m+"</th>";});
  h+="<th>Total</th></tr></thead><tbody>";
  depts.forEach(function(k){
    var c=cf(k),tot=agg(k,field);
    h+="<tr><td style='color:"+c.color+"'>"+k+(c.sub?" (sub)":"")+"</td>";
    MN.forEach(function(m){var v=am(k,field,m);h+="<td style='color:"+(v>0?pc_:"#d1d5db")+"'>"+(v>0?fm(v):"--")+"</td>";});
    h+="<td style='font-weight:700;color:"+pc_+"'>"+fm(tot)+"</td></tr>";
  });
  var tDs=totDs||depts;
  var g=tDs.reduce(function(s,k){return s+agg(k,field);},0);
  h+="<tfoot><tr><td>TOTAL</td>";
  MN.forEach(function(m){var v=tDs.reduce(function(s,k){return s+am(k,field,m);},0);h+="<td>"+(v?fm(v):"--")+"</td>";});
  h+="<td>"+fm(g)+"</td></tr></tfoot></table></div>";return h;
}

function renderOv(){
  var all=Object.keys(CFG);
  var mainRev=all.filter(function(k){return cf(k).rev&&!cf(k).sub;});
  var cashDs=all.filter(function(k){return !cf(k).sub;});
  var h="<div class='sec'>Company Summary - YTD 2026</div>";
  h+=kpis(all,mainRev,cashDs);
  h+="<div class='sec'>All Departments</div><div class='dg d4'>";
  all.forEach(function(k){h+=card(k,false);});
  h+="</div>";
  // Revenue table
  var revDs=all.filter(function(k){return cf(k).rev;});
  h+="<div class='sec'>Revenue Table (SAR)</div><div class='tw'><table><thead><tr><th>Department</th>";
  MN.forEach(function(m){h+="<th>"+m+"</th>";});
  h+="<th>Total</th><th>Target</th><th>%</th></tr></thead><tbody>";
  revDs.forEach(function(k){
    var c=cf(k),tot=agg(k,"Revenue"),tgt=agg(k,"Annual Target"),p=tgt>0?(tot/tgt*100):0;
    h+="<tr><td style='color:"+c.color+"'>"+k+(c.sub?" (sub)":"")+"</td>";
    MN.forEach(function(m){var v=am(k,"Revenue",m);h+="<td class='"+(v>0?"pos":"ze")+"'>"+(v>0?fm(v):"--")+"</td>";});
    h+="<td class='pos' style='font-weight:700'>"+fm(tot)+"</td><td class='ze'>"+fm(tgt)+"</td>";
    h+="<td style='font-weight:700;color:"+pc(p)+"'>"+p.toFixed(1)+"%</td></tr>";
  });
  h+="</tbody></table></div>";
  h+="<div class='sec'>Cash In - Monthly (SAR)</div>"+cashTable(cashDs,"Cash In");
  h+="<div class='sec'>Cash Out - Monthly (SAR)</div>"+cashTable(cashDs,"Cash Out");
  document.getElementById("p-ov").innerHTML=h;
}

function renderPr(){
  var depts=["B2C","B2B"];
  var h="<div class='sec'>Product - YTD 2026</div>";
  h+=kpis(depts,depts,depts);
  h+="<div class='sec'>Departments</div><div class='dg d2'>";
  depts.forEach(function(k){h+=card(k,false);});
  h+="</div><div class='sec'>Department Details</div>";
  depts.forEach(function(k){h+=deptTable(k);});
  document.getElementById("p-pr").innerHTML=h;
}

function renderPj(){
  var depts=["B2G","MOC KG","DDC"];
  var h="<div class='sec'>Projects - YTD 2026</div>";
  h+=kpis(depts,["B2G"],["B2G"]);
  h+="<div class='sec'>Departments</div><div class='dg d3'>";
  depts.forEach(function(k){h+=card(k,false);});
  h+="</div><div class='sec'>Department Details</div>";
  depts.forEach(function(k){h+=deptTable(k);});
  document.getElementById("p-pj").innerHTML=h;
}

function renderSp(){
  var depts=["Tech & Product","Content & Qual","Operations","HR","Finance","Others"];
  var tE=depts.reduce(function(s,k){return s+(k==="Tech & Product"?agg(k,"Cash Out"):agg(k,"Expenses"));},0);
  var tCO=depts.reduce(function(s,k){return s+agg(k,"Cash Out");},0);
  var net=0-tCO;
  var h="<div class='sec'>Support - YTD 2026</div><div class='kg k3'>";
  h+="<div class='kpi' style='--ac:#dc2626'><div class='kl'>Total Expenses</div><div class='kv' style='color:#dc2626'>"+fK(tE)+"</div></div>";
  h+="<div class='kpi' style='--ac:#dc2626'><div class='kl'>Cash Out</div><div class='kv' style='color:#dc2626'>"+fK(tCO)+"</div></div>";
  h+="<div class='kpi' style='--ac:#dc2626'><div class='kl'>Net Cash Flow</div><div class='kv' style='color:#dc2626'>"+fK(net)+"</div></div>";
  h+="</div><div class='sec'>Departments</div><div class='dg d3'>";
  depts.forEach(function(k){h+=card(k,true);});
  h+="</div><div class='sec'>Cash Out - Monthly (SAR)</div>"+cashTable(depts,"Cash Out");
  document.getElementById("p-sp").innerHTML=h;
}

function renderAll(){renderOv();renderPr();renderPj();renderSp();}
renderAll();
</script>
</body>
</html>
