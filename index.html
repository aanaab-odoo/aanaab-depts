<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>aanaab Departments 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f4ff;color:#1e1b4b}
header{background:#5b21b6;height:52px;display:flex;align-items:center;padding:0 20px;position:sticky;top:0;z-index:50}
.logo{display:flex;align-items:center;gap:7px;margin-right:14px}
.ld{width:8px;height:8px;border-radius:50%;background:#10b981}
.lt{font-size:14px;font-weight:700;color:#fff}
.ls{font-size:11px;color:rgba(255,255,255,.45);margin-left:4px}
.tab{height:52px;padding:0 14px;background:transparent;border:none;color:rgba(255,255,255,.5);font-size:13px;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.tab:hover{color:#fff}
.tab.on{color:#fff;border-bottom-color:#10b981}
.nr{margin-left:auto;display:flex;align-items:center;gap:8px}
.sb{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:12px;font-weight:600;padding:5px 12px;border-radius:7px;cursor:pointer}
.nl{font-size:11px;color:rgba(255,255,255,.4)}
.pg{display:none;padding:18px 22px;max-width:1400px;margin:0 auto}
.pg.on{display:block}
.sec{font-size:11px;font-weight:700;color:#7c3aed;text-transform:uppercase;letter-spacing:2px;margin:16px 0 10px;display:flex;align-items:center;gap:8px}
.sec::after{content:"";flex:1;height:1px;background:#e2deff}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:10px}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:10px}
.kpi{background:#fff;border:1.5px solid #e2deff;border-top:3px solid var(--ac,#5b21b6);border-radius:12px;padding:13px 15px}
.kl{font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.kv{font-size:20px;font-weight:800;line-height:1}
.ks{font-size:11px;color:#9ca3af;margin-top:3px}
.pbar{background:#ede9fe;border-radius:3px;height:4px;margin-top:6px;overflow:hidden}
.pfil{height:100%;border-radius:3px}
.dc{background:#fff;border:1.5px solid #e2deff;border-top:3px solid var(--bc,#5b21b6);border-radius:12px;padding:13px}
.dct{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.dcn{font-size:13px;font-weight:700}
.bdg{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px}
.bp{background:#d1fae5;color:#065f46}
.bl{background:#fee2e2;color:#991b1b}
.bn{background:#fef3c7;color:#92400e}
.cr{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #f0edff}
.cr:last-child{border-bottom:none}
.cl{font-size:11px;color:#9ca3af}
.cv{font-size:12px;font-weight:700}
.dvd{border-top:1px dashed #e2deff;margin:5px 0}
.pos{color:#059669}
.neg{color:#dc2626}
.muted{color:#d1d5db}
.tw{overflow-x:auto;border-radius:12px;border:1.5px solid #e2deff;background:#fff;margin-bottom:14px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#ede9fe;color:#7c3aed;font-weight:700;padding:8px;text-align:right;font-size:11px;white-space:nowrap;border-bottom:1px solid #d4ccff}
th:first-child{text-align:left;min-width:110px}
td{padding:7px 8px;border-bottom:1px solid #f0edff;text-align:right;white-space:nowrap}
td:first-child{text-align:left;font-weight:700}
tr:hover td{background:#faf9ff}
tfoot td{background:#ede9fe!important;font-weight:800;color:#5b21b6;border-top:2px solid #d4ccff}
@media(max-width:900px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:500px){.g4,.g3,.g2{grid-template-columns:1fr}}

#lock{position:fixed;inset:0;background:#5b21b6;display:flex;align-items:center;justify-content:center;z-index:9999}

<script>
var D = JSON.parse(document.getElementById('jdata').textContent);
var CSVURL = 'https://script.google.com/macros/s/AKfycbxQhjxfXaZyjE-ButHBagloi6-jmpaY-0Yh-lv8Desy3wu7g3nJxv5aTsP-OvjnEVKMqQ/exec';
var MN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var CFG = {
  'B2C':             {color:'#3b82f6',rev:true, group:'product'},
  'B2B':             {color:'#10b981',rev:true, group:'product'},
  'B2G':             {color:'#f59e0b',rev:true, group:'projects'},
  'MOC KG':          {color:'#d97706',rev:true, group:'projects',sub:true},
  'DDC':             {color:'#b45309',rev:true, group:'projects',sub:true},
  'Tech and Product':{color:'#8b5cf6',rev:false,group:'support'},
  'Content and Qual':{color:'#ec4899',rev:false,group:'support'},
  'Operations':      {color:'#64748b',rev:false,group:'support'},
  'HR':              {color:'#a78bfa',rev:false,group:'support'},
  'Finance':         {color:'#5b21b6',rev:false,group:'support'},
  'Others':          {color:'#94a3b8',rev:false,group:'support'}
};

function g(k){return CFG[k]||{color:'#6b7280',rev:false,group:'support'};}
function agg(k,f){return MN.reduce(function(s,m){return s+((D[k]&&D[k][f]&&D[k][f][m])||0);},0);}
function am(k,f,m){return (D[k]&&D[k][f]&&D[k][f][m])||0;}
function fK(n){if(!n&&n!==0)return'--';var s=n<0?'-':'',a=Math.abs(n);if(a>=1000000)return s+(a/1000000).toFixed(2)+'M';if(a>=1000)return s+(a/1000).toFixed(1)+'K';return s+Math.round(a).toLocaleString();}
function fm(n){return n?new Intl.NumberFormat('en').format(Math.round(n)):'--';}
function pc(p){return p>=100?'#059669':p>=50?'#d97706':'#dc2626';}
function pbar(p,c){return '<div class="pbar"><div class="pfil" style="width:'+Math.min(p,100)+'%;background:'+c+';height:100%"></div></div>';}

// Navigation
var TABS = ['ov','pr','pj','sp'];
TABS.forEach(function(id){
  document.getElementById('btn-'+id).addEventListener('click',function(){
    TABS.forEach(function(x){
      document.getElementById('p-'+x).className='pg';
      document.getElementById('btn-'+x).className='tab';
    });
    document.getElementById('p-'+id).className='pg on';
    document.getElementById('btn-'+id).className='tab on';
  });
});

// Sync
document.getElementById('syncbtn').addEventListener('click',function(){
  document.getElementById('nlbl').textContent='Syncing...';
  fetch(CSVURL).then(function(r){return r.text();}).then(function(t){
    var p=parseCSV(t);
    if(p&&Object.keys(p).length){D=p;document.getElementById('nlbl').textContent='Updated '+new Date().toLocaleTimeString();renderAll();}
    else{document.getElementById('nlbl').textContent='Embedded data';}
  }).catch(function(){document.getElementById('nlbl').textContent='Embedded data';});
});

function parseCSV(text){
  var lines=text.split('\n');
  var hdr=-1;
  for(var i=0;i<lines.length;i++){if(lines[i].indexOf('Department')===0){hdr=i;break;}}
  if(hdr<0)return null;
  var out={},cur=null;
  for(var i=hdr+1;i<lines.length;i++){
    var cells=lines[i].split(',');
    if(!cells[0]&&!cells[1])continue;
    if(cells[0].indexOf('COMPANY SUMMARY')>=0)break;
    var dv=cells[0].trim().replace(/^[^a-zA-Z]+/,''),fv=cells[1]?cells[1].trim():'';
    if(dv){cur=dv;if(!out[cur])out[cur]={};}
    if(!cur||!fv)continue;
    out[cur][fv]={};
    for(var mi=0;mi<MN.length;mi++){
      var raw=(cells[mi+2]||'').replace(/,/g,'').replace(/"/g,'').trim();
      if(raw.charAt(0)==='(')raw='-'+raw.slice(1,raw.length-1);
      out[cur][fv][MN[mi]]=raw===''?0:(parseFloat(raw)||0);
    }
  }
  return out;
}

function kpis(depts,mRev,cDs){
  var tR=mRev.reduce(function(s,k){return s+agg(k,'Revenue');},0);
  var tT=mRev.reduce(function(s,k){return s+agg(k,'Annual Target');},0);
  var tE=depts.reduce(function(s,k){return s+(k==='Tech and Product'?agg(k,'Cash Out'):agg(k,'Expenses'));},0);
  var tPL=tR-tE,tCI=cDs.reduce(function(s,k){return s+agg(k,'Cash In');},0);
  var tCO=cDs.reduce(function(s,k){return s+agg(k,'Cash Out');},0);
  var net=tCI-tCO,pct=tT>0?(tR/tT*100):0,pC=pc(pct);
  var h='<div class="g4">';
  h+='<div class="kpi" style="--ac:#5b21b6"><div class="kl">Total Revenue</div><div class="kv" style="color:#5b21b6">'+fK(tR)+'</div><div class="ks">SAR</div></div>';
  h+='<div class="kpi" style="--ac:'+pC+'"><div class="kl">% of Target</div><div class="kv" style="color:'+pC+'">'+pct.toFixed(1)+'%</div>'+pbar(pct,pC)+'</div>';
  h+='<div class="kpi" style="--ac:#dc2626"><div class="kl">Total Expenses</div><div class="kv" style="color:#dc2626">'+fK(tE)+'</div></div>';
  h+='<div class="kpi" style="--ac:'+(tPL>=0?'#059669':'#dc2626')+'"><div class="kl">Net P&L</div><div class="kv" style="color:'+(tPL>=0?'#059669':'#dc2626')+'">'+fK(tPL)+'</div><div class="ks">'+(tPL>=0?'Profit':'Loss')+'</div></div>';
  h+='</div><div class="g3" style="margin-top:0">';
  h+='<div class="kpi" style="--ac:#059669"><div class="kl">Cash In</div><div class="kv" style="color:#059669">'+fK(tCI)+'</div></div>';
  h+='<div class="kpi" style="--ac:#dc2626"><div class="kl">Cash Out</div><div class="kv" style="color:#dc2626">'+fK(tCO)+'</div></div>';
  h+='<div class="kpi" style="--ac:'+(net>=0?'#059669':'#dc2626')+'"><div class="kl">Net Cash Flow</div><div class="kv" style="color:'+(net>=0?'#059669':'#dc2626')+'">'+fK(net)+'</div></div>';
  h+='</div>';return h;
}

function card(k,cashOnly){
  var c=g(k);
  var rev=agg(k,'Revenue'),tgt=agg(k,'Annual Target');
  var exp=k==='Tech and Product'?agg(k,'Cash Out'):agg(k,'Expenses');
  var cIn=agg(k,'Cash In'),cOut=agg(k,'Cash Out'),netC=cIn-cOut;
  var pl=c.rev?(rev-exp):(0-exp);
  var p=tgt>0?(rev/tgt*100):0,pC=pc(p);
  var bc=pl>0?'bp':pl<0?'bl':'bn',bt=pl>0?'Profit':pl<0?'Loss':'--';
  var sub=c.sub?' <span style="font-size:10px;background:#fef3c7;color:#92400e;padding:1px 5px;border-radius:3px">sub</span>':'';
  var h='<div class="dc" style="--bc:'+c.color+'">';
  h+='<div class="dct"><span class="dcn">'+k+sub+'</span><span class="bdg '+bc+'">'+bt+'</span></div>';
  if(!cashOnly){
    if(c.rev){
      h+='<div style="font-size:11px;color:#9ca3af">Revenue</div>';
      h+='<div style="font-size:17px;font-weight:800;color:'+c.color+'">'+fK(rev)+' <span style="font-size:11px;color:#9ca3af;font-weight:400">SAR</span></div>';
      h+=pbar(p,pC);
      h+='<div style="font-size:10px;font-weight:700;color:'+pC+';margin-top:2px">'+p.toFixed(1)+'% of '+fK(tgt)+'</div>';
    }
    h+='<div class="cr" style="margin-top:6px"><span class="cl">Expenses'+(k==='Tech and Product'?' (cash out)':'')+'</span><span class="cv neg">'+fK(exp)+'</span></div>';
    h+='<div class="cr"><span class="cl">Net P&L</span><span class="cv" style="color:'+(pl>=0?'#059669':'#dc2626')+'">'+fK(pl)+'</span></div>';
    h+='<div class="dvd"></div>';
  }
  h+='<div class="cr" style="margin-top:'+(cashOnly?'4px':'0')+'"><span class="cl">Cash in</span><span class="cv pos">'+fK(cIn)+'</span></div>';
  h+='<div class="cr"><span class="cl">Cash out</span><span class="cv neg">'+fK(cOut)+'</span></div>';
  h+='<div class="cr"><span class="cl">Net cash</span><span class="cv" style="color:'+(netC>=0?'#059669':'#dc2626')+'">'+fK(netC)+'</span></div>';
  h+='</div>';return h;
}

function deptTable(k){
  var c=g(k);
  var rows=[
    {l:'Revenue',fn:function(m){return am(k,'Revenue',m);}},
    {l:'Annual Target',fn:function(m){return am(k,'Annual Target',m);}},
    {l:'Expenses',fn:function(m){return am(k,'Expenses',m);}},
    {l:'Net P&L',fn:function(m){return am(k,'Revenue',m)-am(k,'Expenses',m);}},
    {l:'Cash In',fn:function(m){return am(k,'Cash In',m);}},
    {l:'Cash Out',fn:function(m){return am(k,'Cash Out',m);}},
    {l:'Net Cash',fn:function(m){return am(k,'Cash In',m)-am(k,'Cash Out',m);}},
  ];
  var colors={'Revenue':'#059669','Annual Target':'#9ca3af','Expenses':'#dc2626','Cash In':'#059669','Cash Out':'#dc2626'};
  var h='<div style="margin-bottom:16px">';
  h+='<div style="font-size:13px;font-weight:700;color:'+c.color+';margin-bottom:8px;padding:7px 12px;background:#fff;border-radius:9px;border-left:4px solid '+c.color+'">'+k+(c.sub?' <span style="font-size:10px;background:#fef3c7;color:#92400e;padding:1px 6px;border-radius:3px">sub</span>':'')+'</div>';
  h+='<div class="tw"><table><thead><tr><th>Field</th>';
  MN.forEach(function(m){h+='<th>'+m+'</th>';});
  h+='<th>Total</th></tr></thead><tbody>';
  rows.forEach(function(row){
    var tot=MN.reduce(function(s,m){return s+row.fn(m);},0);
    var bc2=colors[row.l]||'#1e1b4b';
    h+='<tr><td style="color:'+bc2+'">'+row.l+'</td>';
    MN.forEach(function(m){
      var v=row.fn(m);
      var col=v>0?(colors[row.l]||'#059669'):v<0?'#dc2626':'#d1d5db';
      h+='<td style="color:'+col+'">'+(v!==0?fm(v):'--')+'</td>';
    });
    var tc=tot>0?(colors[row.l]||'#059669'):tot<0?'#dc2626':'#d1d5db';
    h+='<td style="font-weight:700;color:'+tc+'">'+(tot!==0?fm(tot):'--')+'</td></tr>';
  });
  h+='</tbody></table></div></div>';return h;
}

function ctable(depts,field,tDs){
  var gc=field==='Cash In'?'#059669':'#dc2626';
  var h='<div class="tw"><table><thead><tr><th>Department</th>';
  MN.forEach(function(m){h+='<th>'+m+'</th>';});
  h+='<th>Total</th></tr></thead><tbody>';
  depts.forEach(function(k){
    var c=g(k),tot=agg(k,field);
    h+='<tr><td style="color:'+c.color+'">'+k+(c.sub?' (sub)':'')+'</td>';
    MN.forEach(function(m){var v=am(k,field,m);h+='<td style="color:'+(v>0?gc:'#d1d5db')+'">'+(v>0?fm(v):'--')+'</td>';});
    h+='<td style="font-weight:700;color:'+gc+'">'+fm(tot)+'</td></tr>';
  });
  var td2=tDs||depts;
  var gt=td2.reduce(function(s,k){return s+agg(k,field);},0);
  h+='<tfoot><tr><td>TOTAL</td>';
  MN.forEach(function(m){var v=td2.reduce(function(s,k){return s+am(k,field,m);},0);h+='<td>'+(v?fm(v):'--')+'</td>';});
  h+='<td>'+fm(gt)+'</td></tr></tfoot></table></div>';return h;
}

function renderOv(){
  var all=Object.keys(CFG);
  var mRev=all.filter(function(k){return g(k).rev&&!g(k).sub;});
  var cDs=all.filter(function(k){return !g(k).sub;});
  var h='<div class="sec">Company Summary - YTD 2026</div>';
  h+=kpis(all,mRev,cDs);
  h+='<div class="sec">All Departments</div><div class="g4">';
  all.forEach(function(k){h+=card(k,false);});
  h+='</div>';
  var rDs=all.filter(function(k){return g(k).rev;});
  h+='<div class="sec">Revenue Table (SAR)</div><div class="tw"><table><thead><tr><th>Department</th>';
  MN.forEach(function(m){h+='<th>'+m+'</th>';});
  h+='<th>Total</th><th>Target</th><th>%</th></tr></thead><tbody>';
  rDs.forEach(function(k){
    var c=g(k),tot=agg(k,'Revenue'),tgt=agg(k,'Annual Target'),p=tgt>0?(tot/tgt*100):0;
    h+='<tr><td style="color:'+c.color+'">'+k+(c.sub?' (sub)':'')+'</td>';
    MN.forEach(function(m){var v=am(k,'Revenue',m);h+='<td class="'+(v>0?'pos':'muted')+'">'+(v>0?fm(v):'--')+'</td>';});
    h+='<td class="pos" style="font-weight:700">'+fm(tot)+'</td><td class="muted">'+fm(tgt)+'</td>';
    h+='<td style="font-weight:700;color:'+pc(p)+'">'+p.toFixed(1)+'%</td></tr>';
  });
  h+='</tbody></table></div>';
  h+='<div class="sec">Cash In - Monthly (SAR)</div>'+ctable(cDs,'Cash In');
  h+='<div class="sec">Cash Out - Monthly (SAR)</div>'+ctable(cDs,'Cash Out');
  document.getElementById('p-ov').innerHTML=h;
}

function renderPr(){
  var depts=['B2C','B2B'];
  var h='<div class="sec">Product - YTD 2026</div>';
  h+=kpis(depts,depts,depts);
  h+='<div class="sec">Departments</div><div class="g2">';
  depts.forEach(function(k){h+=card(k,false);});
  h+='</div><div class="sec">Department Details</div>';
  depts.forEach(function(k){h+=deptTable(k);});
  document.getElementById('p-pr').innerHTML=h;
}

function renderPj(){
  var depts=['B2G','MOC KG','DDC'];
  var h='<div class="sec">Projects - YTD 2026</div>';
  h+=kpis(depts,['B2G'],['B2G']);
  h+='<div class="sec">Departments</div><div class="g3">';
  depts.forEach(function(k){h+=card(k,false);});
  h+='</div><div class="sec">Department Details</div>';
  depts.forEach(function(k){h+=deptTable(k);});
  document.getElementById('p-pj').innerHTML=h;
}

function renderSp(){
  var depts=['Tech and Product','Content and Qual','Operations','HR','Finance','Others'];
  var tE=depts.reduce(function(s,k){return s+(k==='Tech and Product'?agg(k,'Cash Out'):agg(k,'Expenses'));},0);
  var tCO=depts.reduce(function(s,k){return s+agg(k,'Cash Out');},0);
  var h='<div class="sec">Support - YTD 2026</div><div class="g3">';
  h+='<div class="kpi" style="--ac:#dc2626"><div class="kl">Total Expenses</div><div class="kv" style="color:#dc2626">'+fK(tE)+'</div></div>';
  h+='<div class="kpi" style="--ac:#dc2626"><div class="kl">Cash Out</div><div class="kv" style="color:#dc2626">'+fK(tCO)+'</div></div>';
  h+='<div class="kpi" style="--ac:#dc2626"><div class="kl">Net Cash</div><div class="kv" style="color:#dc2626">'+fK(0-tCO)+'</div></div>';
  h+='</div><div class="sec">Departments</div><div class="g3">';
  depts.forEach(function(k){h+=card(k,true);});
  h+='</div><div class="sec">Cash Out - Monthly (SAR)</div>'+ctable(depts,'Cash Out');
  document.getElementById('p-sp').innerHTML=h;
}

function renderAll(){renderOv();renderPr();renderPj();renderSp();}
renderAll();
</script>
</body>
</html>
